<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface2: #F0EEE9;
    --border: rgba(0,0,0,0.09);
    --border-strong: rgba(0,0,0,0.15);
    --text: #1A1916;
    --text-muted: #7A7870;
    --text-faint: #ABA9A3;
    --accent: #4A6741;
    --accent-light: #EAF1E8;
    --accent-text: #2E4229;
    --danger: #C0392B;
    --danger-light: #FDECEA;
    --tag-colors: #D4E8FF,#D9F0D8,#FFF0D4,#F5D4F5,#FFD4D4;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---------- HEADER ---------- */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo span { color: var(--accent); }

  .header-stats {
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .header-stats strong { color: var(--text); }

  /* ---------- LAYOUT ---------- */
  .app {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 0;
    flex: 1;
    max-width: 960px;
    width: 100%;
    margin: 0 auto;
    padding: 24px 16px;
    align-items: start;
  }

  /* ---------- SIDEBAR ---------- */
  .sidebar {
    position: sticky;
    top: 80px;
    padding-right: 20px;
  }

  .sidebar-section { margin-bottom: 24px; }

  .sidebar-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 6px;
    padding-left: 10px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    user-select: none;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }

  .nav-item.active {
    background: var(--accent-light);
    color: var(--accent-text);
    font-weight: 500;
  }

  .nav-item .nav-icon { font-size: 15px; width: 16px; text-align: center; }

  .nav-count {
    margin-left: auto;
    font-size: 11px;
    background: var(--surface2);
    color: var(--text-muted);
    border-radius: 99px;
    padding: 1px 7px;
    font-weight: 500;
  }

  .nav-item.active .nav-count {
    background: rgba(74,103,65,0.15);
    color: var(--accent-text);
  }

  /* Progress bar */
  .progress-wrap { margin-top: 20px; padding: 14px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); }
  .progress-top { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  .progress-top strong { color: var(--text); font-weight: 600; }
  .progress-bar { height: 5px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; }

  /* ---------- MAIN ---------- */
  .main { min-width: 0; }

  /* Add task card */
  .add-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }

  .add-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .add-input {
    flex: 1;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .add-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(74,103,65,0.12);
  }

  .add-input::placeholder { color: var(--text-faint); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 0.1s, transform 0.1s;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .btn-primary:hover { background: var(--accent-text); }

  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border-color: var(--border-strong);
  }

  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  .add-extras {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .extra-label { font-size: 12px; color: var(--text-faint); }

  .priority-btn {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 99px;
    border: 1px solid var(--border-strong);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.1s;
  }

  .priority-btn.sel-low { background: #EAF1E8; color: #2E4229; border-color: #9EC499; }
  .priority-btn.sel-medium { background: #FFF8E1; color: #7A5D00; border-color: #E0C84A; }
  .priority-btn.sel-high { background: #FDECEA; color: #8B1A13; border-color: #F0A09A; }

  .due-input {
    font-size: 12px;
    border: 1px solid var(--border-strong);
    border-radius: 99px;
    padding: 4px 10px;
    color: var(--text-muted);
    background: transparent;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    outline: none;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .toolbar-left { display: flex; gap: 6px; flex: 1; }

  .filter-pill {
    font-size: 13px;
    padding: 5px 12px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.1s;
  }

  .filter-pill:hover { border-color: var(--border-strong); color: var(--text); }
  .filter-pill.active { background: var(--accent-light); color: var(--accent-text); border-color: #9EC499; font-weight: 500; }

  .sort-select {
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 5px 10px;
    background: var(--surface);
    color: var(--text-muted);
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    outline: none;
  }

  /* Task list */
  .task-list { display: flex; flex-direction: column; gap: 6px; }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: border-color 0.15s, opacity 0.2s;
    position: relative;
  }

  .task-card:hover { border-color: var(--border-strong); }
  .task-card.done { opacity: 0.55; }
  .task-card.done .task-text { text-decoration: line-through; color: var(--text-muted); }

  .task-card.priority-high { border-left: 3px solid #E24B4A; }
  .task-card.priority-medium { border-left: 3px solid #E0C84A; }
  .task-card.priority-low { border-left: 3px solid #4A9E47; }

  .task-check-wrap {
    margin-top: 2px;
    flex-shrink: 0;
  }

  .task-check {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border-strong);
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    transition: background 0.15s, border-color 0.15s;
    font-size: 11px;
    color: transparent;
    user-select: none;
  }

  .task-check.checked {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .task-body { flex: 1; min-width: 0; }

  .task-text {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    word-break: break-word;
  }

  .task-meta {
    display: flex;
    gap: 8px;
    margin-top: 5px;
    flex-wrap: wrap;
    align-items: center;
  }

  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 99px;
    font-weight: 500;
    background: var(--surface2);
    color: var(--text-muted);
  }

  .due-tag {
    font-size: 11px;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .due-tag.overdue { color: var(--danger); }

  .priority-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 99px;
    font-weight: 500;
  }

  .priority-tag.high { background: #FDECEA; color: #8B1A13; }
  .priority-tag.medium { background: #FFF8E1; color: #7A5D00; }
  .priority-tag.low { background: #EAF1E8; color: #2E4229; }

  .task-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .task-card:hover .task-actions { opacity: 1; }

  .icon-btn {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-faint);
    transition: background 0.1s, color 0.1s;
  }

  .icon-btn:hover { background: var(--surface2); color: var(--text); }
  .icon-btn.delete:hover { background: var(--danger-light); color: var(--danger); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-faint);
    font-size: 14px;
  }

  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: var(--text-faint);
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 8px 12px 8px 32px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-faint); }

  /* Edit modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    display: none;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    width: 100%;
    max-width: 440px;
    border: 1px solid var(--border-strong);
  }

  .modal-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 14px;
    color: var(--text);
  }

  .modal-field { margin-bottom: 12px; }
  .modal-field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; }

  .modal-field input, .modal-field select, .modal-field textarea {
    width: 100%;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus {
    border-color: var(--accent);
  }

  .modal-field textarea { resize: vertical; min-height: 64px; }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: #fff;
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    z-index: 500;
    transition: transform 0.25s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Clear completed */
  .clear-row {
    text-align: right;
    margin-top: 8px;
    min-height: 20px;
  }

  .clear-btn {
    background: none;
    border: none;
    font-size: 12px;
    color: var(--text-faint);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .clear-btn:hover { color: var(--danger); }

  /* Responsive */
  @media (max-width: 620px) {
    .app { grid-template-columns: 1fr; padding: 12px; }
    .sidebar { position: static; padding-right: 0; display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .sidebar-section { margin-bottom: 0; }
    .sidebar-label { display: none; }
    .progress-wrap { display: none; }
    .nav-item { padding: 5px 10px; }
    header { padding: 0 12px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Task<span>·</span>ly</div>
  <div class="header-stats">
    <span><strong id="stat-total">0</strong> total</span>
    <span><strong id="stat-done">0</strong> done</span>
    <span><strong id="stat-left">0</strong> left</span>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Views</div>
      <button class="nav-item active" data-filter="all" onclick="setNav(this)">
        <span class="nav-icon">📋</span> All tasks
        <span class="nav-count" id="cnt-all">0</span>
      </button>
      <button class="nav-item" data-filter="active" onclick="setNav(this)">
        <span class="nav-icon">🔵</span> Active
        <span class="nav-count" id="cnt-active">0</span>
      </button>
      <button class="nav-item" data-filter="completed" onclick="setNav(this)">
        <span class="nav-icon">✅</span> Completed
        <span class="nav-count" id="cnt-done">0</span>
      </button>
      <button class="nav-item" data-filter="today" onclick="setNav(this)">
        <span class="nav-icon">📅</span> Due today
        <span class="nav-count" id="cnt-today">0</span>
      </button>
      <button class="nav-item" data-filter="high" onclick="setNav(this)">
        <span class="nav-icon">🔴</span> High priority
        <span class="nav-count" id="cnt-high">0</span>
      </button>
    </div>

    <div class="progress-wrap">
      <div class="progress-top">
        <span>Progress</span>
        <strong id="progress-pct">0%</strong>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- Add card -->
    <div class="add-card">
      <div class="add-row">
        <input id="add-input" class="add-input" type="text" placeholder="What needs to be done?" onkeydown="if(event.key==='Enter')addTask()" />
        <button class="btn btn-primary" onclick="addTask()">+ Add</button>
      </div>
      <div class="add-extras">
        <span class="extra-label">Priority:</span>
        <button class="priority-btn" id="pb-low" onclick="setPri('low')">Low</button>
        <button class="priority-btn" id="pb-medium" onclick="setPri('medium')">Medium</button>
        <button class="priority-btn sel-high" id="pb-high" onclick="setPri('high')">High</button>
        <span class="extra-label" style="margin-left:4px">Due:</span>
        <input type="date" class="due-input" id="add-due" />
      </div>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search" placeholder="Search tasks…" oninput="render()" />
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <button class="filter-pill active" data-sub="all" onclick="setSub(this)">All</button>
        <button class="filter-pill" data-sub="active" onclick="setSub(this)">Active</button>
        <button class="filter-pill" data-sub="done" onclick="setSub(this)">Done</button>
      </div>
      <select class="sort-select" onchange="currentSort=this.value; render()">
        <option value="created">Newest first</option>
        <option value="due">Due date</option>
        <option value="priority">Priority</option>
        <option value="alpha">A → Z</option>
      </select>
    </div>

    <!-- Task list -->
    <div class="task-list" id="task-list"></div>
    <div class="empty" id="empty-state" style="display:none">
      <div class="empty-icon">🗒️</div>
      <div>No tasks here</div>
      <div style="margin-top:4px; font-size:12px">Add one above to get started</div>
    </div>

    <div class="clear-row">
      <button class="clear-btn" id="clear-btn" style="display:none" onclick="clearDone()">Clear completed</button>
    </div>
  </main>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Edit task</div>
    <div class="modal-field">
      <label>Task</label>
      <input id="edit-text" type="text" />
    </div>
    <div class="modal-field">
      <label>Priority</label>
      <select id="edit-priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Due date</label>
      <input id="edit-due" type="date" />
    </div>
    <div class="modal-field">
      <label>Notes</label>
      <textarea id="edit-notes" placeholder="Optional notes…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save changes</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let tasks = [
  { id: 1, text: 'Review project proposal', done: false, priority: 'high', due: '', notes: '', created: Date.now()-5000 },
  { id: 2, text: 'Schedule team standup', done: false, priority: 'medium', due: today(), notes: '', created: Date.now()-4000 },
  { id: 3, text: 'Update documentation', done: true, priority: 'low', due: '', notes: '', created: Date.now()-3000 },
];
let nextId = 4;
let currentPri = 'high';
let currentFilter = 'all';
let currentSub = 'all';
let currentSort = 'created';
let editingId = null;

function today() {
  return new Date().toISOString().slice(0,10);
}

function setPri(p) {
  currentPri = p;
  ['low','medium','high'].forEach(x => {
    const b = document.getElementById('pb-'+x);
    b.className = 'priority-btn' + (x === p ? ' sel-'+x : '');
  });
}

function setNav(el) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentFilter = el.dataset.filter;
  render();
}

function setSub(el) {
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentSub = el.dataset.sub;
  render();
}

function addTask() {
  const input = document.getElementById('add-input');
  const text = input.value.trim();
  if (!text) { input.focus(); return; }
  const due = document.getElementById('add-due').value;
  tasks.unshift({ id: nextId++, text, done: false, priority: currentPri, due, notes: '', created: Date.now() });
  input.value = '';
  render();
  showToast('Task added');
}

function toggle(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; render(); }
}

function remove(id) {
  tasks = tasks.filter(t => t.id !== id);
  render();
  showToast('Task deleted');
}

function clearDone() {
  tasks = tasks.filter(t => !t.done);
  render();
  showToast('Completed tasks cleared');
}

function openEdit(id) {
  editingId = id;
  const t = tasks.find(t => t.id === id);
  document.getElementById('edit-text').value = t.text;
  document.getElementById('edit-priority').value = t.priority;
  document.getElementById('edit-due').value = t.due;
  document.getElementById('edit-notes').value = t.notes;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
}

function saveEdit() {
  const t = tasks.find(t => t.id === editingId);
  if (!t) return;
  const text = document.getElementById('edit-text').value.trim();
  if (!text) return;
  t.text = text;
  t.priority = document.getElementById('edit-priority').value;
  t.due = document.getElementById('edit-due').value;
  t.notes = document.getElementById('edit-notes').value;
  closeModal();
  render();
  showToast('Task updated');
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

const priOrder = { high: 0, medium: 1, low: 2 };

function getVisible() {
  const search = document.getElementById('search').value.toLowerCase();
  const td = today();

  return tasks.filter(t => {
    if (search && !t.text.toLowerCase().includes(search)) return false;
    if (currentSub === 'active' && t.done) return false;
    if (currentSub === 'done' && !t.done) return false;
    if (currentFilter === 'active' && t.done) return false;
    if (currentFilter === 'completed' && !t.done) return false;
    if (currentFilter === 'today' && t.due !== td) return false;
    if (currentFilter === 'high' && (t.priority !== 'high' || t.done)) return false;
    return true;
  }).sort((a, b) => {
    if (currentSort === 'created') return b.created - a.created;
    if (currentSort === 'due') {
      if (!a.due && !b.due) return 0;
      if (!a.due) return 1;
      if (!b.due) return -1;
      return a.due.localeCompare(b.due);
    }
    if (currentSort === 'priority') return priOrder[a.priority] - priOrder[b.priority];
    if (currentSort === 'alpha') return a.text.localeCompare(b.text);
    return 0;
  });
}

function render() {
  const list = document.getElementById('task-list');
  const empty = document.getElementById('empty-state');
  const visible = getVisible();
  const td = today();

  list.innerHTML = '';
  visible.forEach(t => {
    const card = document.createElement('div');
    card.className = `task-card priority-${t.priority}${t.done ? ' done' : ''}`;

    let dueBadge = '';
    if (t.due) {
      const overdue = !t.done && t.due < td;
      dueBadge = `<span class="due-tag${overdue ? ' overdue' : ''}">📅 ${overdue ? 'Overdue · ' : ''}${formatDate(t.due)}</span>`;
    }

    card.innerHTML = `
      <div class="task-check-wrap">
        <div class="task-check ${t.done ? 'checked' : ''}" onclick="toggle(${t.id})" role="checkbox" aria-checked="${t.done}" aria-label="Mark done">
          ${t.done ? '✓' : ''}
        </div>
      </div>
      <div class="task-body">
        <div class="task-text">${escapeHTML(t.text)}</div>
        <div class="task-meta">
          <span class="priority-tag ${t.priority}">${t.priority}</span>
          ${dueBadge}
          ${t.notes ? '<span class="tag">📝 Note</span>' : ''}
        </div>
      </div>
      <div class="task-actions">
        <button class="icon-btn" onclick="openEdit(${t.id})" aria-label="Edit task" title="Edit">✏️</button>
        <button class="icon-btn delete" onclick="remove(${t.id})" aria-label="Delete task" title="Delete">🗑️</button>
      </div>
    `;
    list.appendChild(card);
  });

  empty.style.display = visible.length === 0 ? 'block' : 'none';

  // Stats
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const active = total - done;
  const pct = total === 0 ? 0 : Math.round(done / total * 100);

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-left').textContent = active;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  document.getElementById('cnt-all').textContent = total;
  document.getElementById('cnt-active').textContent = active;
  document.getElementById('cnt-done').textContent = done;
  document.getElementById('cnt-today').textContent = tasks.filter(t => t.due === td && !t.done).length;
  document.getElementById('cnt-high').textContent = tasks.filter(t => t.priority === 'high' && !t.done).length;

  document.getElementById('clear-btn').style.display = done > 0 ? 'inline' : 'none';
}

function formatDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();
</script>
</body>
</html>
